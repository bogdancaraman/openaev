name: "[OpenAEV] Copilot On-Demand Review"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  on-demand-review:
    name: "🤖 On-demand agent review"
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    steps:
      - name: Parse review command
        id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          AGENT=""

          case "$COMMENT" in
            */review\ security*)   AGENT="security-reviewer" ;;
            */review\ perf*)       AGENT="performance-reviewer" ;;
            */review\ tenancy*)    AGENT="multi-tenancy-reviewer" ;;
            */review\ test*)       AGENT="test-specialist" ;;
            */review\ frontend*)   AGENT="frontend-reviewer" ;;
            */review\ all*)        AGENT="all" ;;
            *)
              echo "Unknown review command: $COMMENT"
              AGENT="unknown"
              ;;
          esac

          echo "agent=$AGENT" >> "$GITHUB_OUTPUT"

      - name: Acknowledge command
        if: steps.parse.outputs.agent != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            const agent = '${{ steps.parse.outputs.agent }}';
            const agentNames = {
              'security-reviewer': '🔒 Security Reviewer',
              'performance-reviewer': '⚡ Performance Reviewer',
              'multi-tenancy-reviewer': '🏠 Multi-Tenancy Reviewer',
              'test-specialist': '🧪 Test Specialist',
              'frontend-reviewer': '🎨 Frontend Reviewer',
              'all': '🔒⚡🏠🧪🎨 All Agents',
            };

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **${agentNames[agent] || agent}** review requested by @${context.payload.comment.user.login}.\n\n> Agent will analyze the PR and post findings as a review comment.`,
            });

      - name: Unknown command
        if: steps.parse.outputs.agent == 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '❓ Unknown review command. Available commands:',
                '',
                '| Command | Agent |',
                '|---|---|',
                '| `/review security` | 🔒 Security Reviewer |',
                '| `/review perf` | ⚡ Performance Reviewer |',
                '| `/review tenancy` | 🏠 Multi-Tenancy Reviewer |',
                '| `/review tests` | 🧪 Test Specialist |',
                '| `/review frontend` | 🎨 Frontend Reviewer |',
                '| `/review all` | All agents |',
              ].join('\n'),
            });

